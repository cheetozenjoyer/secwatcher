name: secwatcher

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-secfile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download
        env:
          SEC_URL: ${{ secrets.SEC_FILE_URL }}
        run: |
          TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")
          echo "FETCH_TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          curl -fsSL "$SEC_URL" -o /tmp/secfile_new
          echo "Download successful."

      - name: Check for changes
        id: shacheck
        run: |
          NEW_SHA=$(sha256sum /tmp/secfile_new | awk '{print $1}')
          echo "New SHA: $NEW_SHA"

          LAST_SHA_FILE=".last_sha"
          if [ -f "$LAST_SHA_FILE" ]; then
            LAST_SHA=$(cat "$LAST_SHA_FILE")
          else
            LAST_SHA=""
          fi
          echo "Last SHA: ${LAST_SHA:-<none>}"

          if [ "$NEW_SHA" = "$LAST_SHA" ]; then
            echo "No changes detected. Skipping."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Change detected!"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "$NEW_SHA" > .last_sha
          fi

      - name: Archive and update
        if: steps.shacheck.outputs.changed == 'true'
        run: |
          mkdir -p old

          if [ -f "secfile_latest" ]; then
            cp "secfile_latest" "old/secfile_${FETCH_TIMESTAMP}"
            echo "Archived -> old/secfile_${FETCH_TIMESTAMP}"
          fi

          cp /tmp/secfile_new secfile_latest
          echo "Updated secfile_latest"

      - name: Commit and push changes
        if: steps.shacheck.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add secfile_latest old/ .last_sha
          git commit -m "chore: update secfile ${{ env.FETCH_TIMESTAMP }}"
          git push